name: 💡 功能建议
description: 提一个新功能或改进想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: 想法很重要，但不一定都会做——会结合「阅读为核」的产品方向取舍。
  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 你在什么场景下、遇到了什么不顺手的地方？（先说问题，再说方案）
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你设想的做法
  - type: textarea
    id: alternatives
    attributes:
      label: 你试过的替代办法
